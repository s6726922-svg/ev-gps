<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณทางเลือก EV (Graph-Based)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* (สไตล์เดิมของคุณคงไว้) */
        .review-box { margin-top: 10px; padding: 10px; background: #f8fafc; border-radius: 8px; font-size: 13px; }
        .review-input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="container">
        <!-- แดชบอร์ดวิเคราะห์ (Graph Theory) -->
        <div class="panel">
            <h3><i class="fa-solid fa-satellite-dish"></i> ระบบจัดสรรโครงข่ายและคำนวณทางเลือก EV</h3>
            <div id="graph-metrics"></div>
        </div>

        <div id="recommendation-area"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ... (ข้อมูล stations เดิมของคุณ) ...

        function renderStations() {
            let html = `<h4>สถานีแนะนำตามการวิเคราะห์ทฤษฎีกราฟ</h4>`;
            stations.slice(0, 2).forEach((s, i) => {
                let id = "rev-" + i;
                html += `
                    <div class="${i === 0 ? 'station-main' : 'station-sub'}">
                        <b>${i === 0 ? '⚡ สถานีหลัก:' : '📍 สถานีรอง:'} ${s.name}</b>
                        <p>ระยะทาง: ${(s.dist * 111).toFixed(2)} กม.</p>
                        
                        <!-- ช่องรีวิว -->
                        <div class="review-box">
                            <input type="text" id="${id}-name" class="review-input" placeholder="ชื่อของคุณ">
                            <textarea id="${id}-text" class="review-input" placeholder="รีวิวสถานีนี้..."></textarea>
                            <button onclick="saveReview('${id}', '${s.name}')" style="background:#22c55e; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">ส่งรีวิว</button>
                            <div id="${id}-list"></div>
                        </div>
                    </div>`;
            });
            document.getElementById('recommendation-area').innerHTML = html;
        }

        function saveReview(id, stationName) {
            let name = document.getElementById(id + '-name').value;
            let text = document.getElementById(id + '-text').value;
            if(!name || !text) return alert("กรุณากรอกข้อมูลให้ครบ");
            
            let list = document.getElementById(id + '-list');
            list.innerHTML += `<p><b>${name}</b>: ${text}</p>`;
            
            // เคลียร์ค่า
            document.getElementById(id + '-name').value = '';
            document.getElementById(id + '-text').value = '';
        }

        renderStations();
    </script>
</body>
</html>
