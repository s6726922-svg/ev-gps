<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบสถานีชาร์จ EV อัจฉริยะ - นครสวรรค์</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f8fafc; padding: 20px; }
        #map { width: 100%; height: 40vh; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { padding: 15px; margin: 10px 0; border-radius: 14px; border: 1px solid #e2e8f0; background: #fff; }
        .review-section { margin-top: 10px; padding: 10px; background: #f8fafc; border-radius: 10px; border: 1px dashed #cbd5e1; }
        textarea { width: 100%; height: 50px; border-radius: 8px; border: 1px solid #cbd5e1; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .tag { display: inline-block; background: #e2e8f0; padding: 2px 8px; border-radius: 8px; font-size: 11px; margin-right: 5px; }
        .analysis-box { background: #eff6ff; padding: 15px; border-radius: 14px; margin-bottom: 20px; border-left: 5px solid #3b82f6; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="panel">
        <div class="analysis-box" id="analysis">กำลังประมวลผลข้อมูลโครงข่าย...</div>
        <h3><i class="fa-solid fa-charging-station"></i> รายการสถานีชาร์จทั้งหมด (${evStations.length} แห่ง)</h3>
        <div id="list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var evStations = [
            { name: "ReverSharger (ส.อรุณ)", lat: 15.7099424, lng: 100.1179482, slots: 4, type: "DC 120 kW", amenities: ["7-Eleven", "ห้องน้ำ", "กาแฟ"] },
            { name: "MG Super Charge", lat: 15.700614, lng: 100.1210426, slots: 2, type: "DC 50 kW", amenities: ["ห้องน้ำ"] },
            { name: "EA Anywhere (จุดที่ 1)", lat: 15.6976186, lng: 100.1195736, slots: 3, type: "AC 22 kW", amenities: ["ห้องน้ำ"] },
            { name: "EA Anywhere (จุดที่ 2)", lat: 15.7309677, lng: 100.1164405, slots: 4, type: "DC 150 kW", amenities: ["7-Eleven", "Amazon"] },
            { name: "EA Anywhere (จุดที่ 3)", lat: 15.7369174, lng: 100.1187196, slots: 2, type: "DC 150 kW", amenities: ["ห้องน้ำ"] },
            { name: "EA Anywhere (จุดที่ 4)", lat: 15.7489949, lng: 100.1215241, slots: 6, type: "DC 150 kW", amenities: ["7-Eleven", "ห้องน้ำ"] },
            { name: "Tesla Supercharger", lat: 15.711412, lng: 100.0561, slots: 4, type: "DC 250 kW", amenities: ["ห้าง V-Square", "Starbucks"] },
            { name: "ReverSharger 2", lat: 15.6401394, lng: 100.1332916, slots: 2, type: "DC 120 kW", amenities: ["ร้านสะดวกซื้อ"] },
            { name: "Altervim Charging", lat: 15.7078974, lng: 100.0946941, slots: 2, type: "DC 90 kW", amenities: ["ห้องน้ำ"] },
            { name: "Spark Charging", lat: 15.7076225, lng: 100.0876302, slots: 2, type: "DC 120 kW", amenities: ["7-Eleven", "อินทนิล"] },
            { name: "PEA VOLTA นครสวรรค์", lat: 15.7096599, lng: 100.1154054, slots: 4, type: "DC 120 kW", amenities: ["สำนักงาน PEA"] },
            { name: "PTT Station (จุดที่ 1)", lat: 15.7079146, lng: 100.1429420, slots: 3, type: "DC 120 kW", amenities: ["7-Eleven", "Amazon"] },
            { name: "PTT Station (จุดที่ 2)", lat: 15.6317220, lng: 100.1294172, slots: 3, type: "DC 120 kW", amenities: ["7-Eleven", "Amazon"] }
        ];

        var map = L.map('map').setView([15.700, 100.120], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        // เพิ่มหมุดบนแผนที่ทั้งหมด
        evStations.forEach(st => {
            L.marker([st.lat, st.lng]).addTo(map).bindPopup(`<b>${st.name}</b><br>${st.type} (${st.slots} ช่อง)`);
        });

        // แสดงผลรายการ
        document.getElementById("list").innerHTML = evStations.map(s => `
            <div class="card">
                <strong>${s.name}</strong><br>
                <small><i class="fa-solid fa-bolt"></i> ${s.type} | <i class="fa-solid fa-car"></i> ${s.slots} ช่องชาร์จ</small><br>
                <div>${s.amenities.map(a => `<span class="tag">${a}</span>`).join('')}</div>
                <div class="review-section">
                    <label style="font-size: 12px; color: #64748b;">รีวิวสถานีนี้:</label>
                    <textarea placeholder="เขียนรีวิว..."></textarea>
                </div>
            </div>
        `).join('');

        document.getElementById("analysis").innerHTML = `<i class="fa-solid fa-check-double"></i> <b>เชื่อมต่อโครงข่ายคณิตศาสตร์สำเร็จ!</b> แสดงผลสถานีชาร์จ EV ในระบบจำนวน ${evStations.length} จุดเรียบร้อยแล้ว`;
    </script>
</body>
</html>
