<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณและแนะนำสถานีชาร์จ EV อัจฉริยะ - นครสวรรค์</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { margin: 0; padding: 0; background-color: #f8fafc; color: #1e293b; }

        #map { width: 100%; height: 45vh; box-shadow: inset 0 -5px 15px rgba(0,0,0,0.05); z-index: 1; }

        .container { padding: 20px; max-width: 650px; margin: -30px auto 30px; position: relative; z-index: 1001; }

        .panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            backdrop-filter: blur(10px);
        }

        h3 { margin-top: 0; color: #0f172a; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        h4 { margin-top: 0; color: #0f172a; font-size: 15px; font-weight: 700; }

        .graph-summary {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 12.5px;
            line-height: 1.9;
            margin-bottom: 16px;
            border: 1px solid #1e293b;
        }
        .graph-summary .line { display: flex; gap: 8px; align-items: flex-start; }
        .graph-summary .ok { color: #4ade80; font-weight: 700; }

        .station-detail, .backup-station {
            padding: 16px;
            margin: 14px 0;
            border-radius: 14px;
            text-align: left;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            cursor: pointer;
        }
        .station-detail:hover, .backup-station:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.08); }

        .station-detail { background: #f0fdf4; border: 2px solid #22c55e; color: #166534; }
        .backup-station { background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; }

        .amenity-tag { background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.05); color: #475569; padding: 3px 10px; border-radius: 20px; font-size: 11px; display: inline-block; margin: 3px 3px 0 0; font-weight: 500; }
        .star-rating { color: #eab308; font-size: 14px; font-weight: 700; display: inline-block; margin-top: 6px; }

        .review-section {
            background: #ffffff;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
        }
        .review-input-group { margin-bottom: 12px; display: flex; gap: 10px; }

        input, select, textarea {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            background: #f8fafc;
        }
        textarea { width: 100%; box-sizing: border-box; resize: none; }

        .btn-submit {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white; border: none; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; width: 100%;
        }

        .user-gps-dot {
            background-color: #3b82f6; border: 2px solid white; border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .map-icon { font-size: 18px; text-align: center; line-height: 1; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.3)); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="panel" id="main-panel">
            <h3><i class="fa-solid fa-satellite-dish" style="color: #3b82f6;"></i> ระบบจัดสรรโครงข่ายและคำนวณทางเลือก EV</h3>
            <div id="status-text">กำลังค้นหาตำแหน่งและประมวลผล...</div>
        </div>

        <div class="review-section">
            <h4><i class="fa-regular fa-comment-dots" style="color: #10b981;"></i> สื่อสารและแบ่งปันข้อมูล</h4>
            <div class="review-input-group">
                <input type="text" id="rev-name" placeholder="ชื่อของคุณ" style="flex: 2;">
            </div>
            <textarea id="rev-text" rows="2" placeholder="ความคิดเห็นของคุณ..." style="margin-bottom: 10px;"></textarea>
            <button class="btn-submit" onclick="addReview()">ส่งความคิดเห็น</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([15.700, 100.120], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' }).addTo(map);

        var evStations = [
            { name: "ReverSharger (ส.อรุณ)", lat: 15.7099424, lng: 100.1179482, slots: 4, type: "DC 120 kW", amenities: ["7-Eleven", "ห้องน้ำ"], systemStars: 4.6 },
            { name: "EA Anywhere (จุดที่ 4)", lat: 15.7489949, lng: 100.1215241, slots: 6, type: "DC 150 kW", amenities: ["7-Eleven", "ห้องน้ำ", "ร้านกาแฟ"], systemStars: 4.8 },
            { name: "Tesla Supercharger", lat: 15.711412, lng: 100.0561, slots: 4, type: "DC 250 kW", amenities: ["Starbucks", "ห้างสรรพสินค้า"], systemStars: 4.9 },
            { name: "EA Anywhere (จุดที่ 3)", lat: 15.7369174, lng: 100.1187196, slots: 2, type: "DC 150 kW", amenities: ["ห้องน้ำ", "ร้านค้าปลีก"], systemStars: 4.3 },
            { name: "PEA VOLTA นครสวรรค์", lat: 15.7096599, lng: 100.1154054, slots: 4, type: "DC 120 kW", amenities: ["สำนักงาน PEA"], systemStars: 4.3 }
        ];

        function openInGoogleMaps(lat, lng) {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`, '_blank');
        }

        navigator.geolocation.getCurrentPosition(function(position) {
            var userLat = position.coords.latitude;
            var userLng = position.coords.longitude;

            // 1. หมุดตำแหน่งปัจจุบันของเรา
            var gpsIcon = L.divIcon({ className: 'user-gps-dot', iconSize: [16, 16] });
            L.marker([userLat, userLng], { icon: gpsIcon }).addTo(map).bindPopup("คุณอยู่ที่นี่").openPopup();

            // คำนวณระยะทาง
            var calculatedList = evStations.map(function(st) {
                var d = calculateHaversine(userLat, userLng, st.lat, st.lng);
                return { ...st, d: d };
            }).sort((a, b) => a.d - b.d);

            var p = calculatedList[0]; // สถานีหลัก (ใกล้สุด)
            var s = calculatedList[1]; // สถานีสำรอง (ใกล้รองลงมา)

            // 2. ปักหมุด "สถานีทั้งหมด" บนแผนที่
            evStations.forEach(function(st) {
                var iconEmoji = '⚡'; 
                if(st.name === p.name) iconEmoji = '⭐'; // ไอคอนสถานีหลัก
                if(st.name === s.name) iconEmoji = '🛡️'; // ไอคอนสถานีสำรอง
                
                var stIcon = L.divIcon({ html: `<div class="map-icon">${iconEmoji}</div>`, className: '', iconSize: [24,24] });
                L.marker([st.lat, st.lng], {icon: stIcon}).addTo(map).bindPopup(`<b>${st.name}</b><br>${st.type}`);
            });

            // 3. ลากเส้นเชื่อมไปยังสถานีหลักและรอง
            L.polyline([[userLat, userLng], [p.lat, p.lng]], {color: '#22c55e', weight: 4}).addTo(map); // เส้นทึบสีเขียว (สถานีหลัก)
            L.polyline([[userLat, userLng], [s.lat, s.lng]], {color: '#f97316', weight: 4, dashArray: '8, 8'}).addTo(map); // เส้นประสีส้ม (สถานีสำรอง)

            // 4. แสดงการ์ดข้อมูล (กดเพื่อนำทาง Google Maps)
            document.getElementById("status-text").innerHTML = `
                <div class="graph-summary">
                    <div class="line"><span class="ok">✓</span> ประมวลผลดุลยภาพพิกัดสำเร็จ (คลิกที่กล่องการ์ดเพื่อนำทางบน Google Maps):</div>
                </div>
                <div class="station-detail" onclick="openInGoogleMaps(${p.lat}, ${p.lng})">
                    <strong>★ สถานีหลักที่ใกล้ที่สุด (Primary): <br>${p.name}</strong><br><br>
                    📍 ระยะทางกระจัด: <b>${p.d.toFixed(2)} กม.</b><br>
                    🔌 ทรัพยากร: <b>${p.slots} ช่องชาร์จ</b> | กระแสตรง (${p.type})<br><br>
                    ${p.amenities.map(a => `<span class='amenity-tag'>${a}</span>`).join('')}<br>
                    <span class="star-rating">คะแนนระบบ: ${p.systemStars} / 5.0</span>
                </div>
                <div class="backup-station" onclick="openInGoogleMaps(${s.lat}, ${s.lng})">
                    <strong>🛡️ สถานีสำรองแนะนำ (Alternative): <br>${s.name}</strong><br><br>
                    📍 ระยะทางถัดไป: <b style="color:#c2410c;">${s.d.toFixed(2)} กม.</b> (กรณีสถานีหลักไม่ว่าง)<br>
                    🔌 ทรัพยากร: <b>${s.slots} ช่องชาร์จ</b> | กระแสตรง (${s.type})<br><br>
                    ${s.amenities.map(a => `<span class='amenity-tag'>${a}</span>`).join('')}<br>
                    <span class="star-rating" style="color:#eab308;">คะแนนระบบ: ${s.systemStars} / 5.0</span>
                </div>
            `;
        });

        function calculateHaversine(lat1, lon1, lat2, lon2) {
            var R = 6371;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function addReview() { alert("บันทึกความคิดเห็นแล้ว ขอบคุณครับ!"); }
    </script>
</body>
</html>
