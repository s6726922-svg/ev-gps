<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสถานีชาร์จ EV อัจฉริยะ (13 จุด) - นครสวรรค์</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { margin: 0; background-color: #f8fafc; }
        #map { width: 100%; height: 45vh; }
        .container { padding: 20px; max-width: 650px; margin: -30px auto 30px; position: relative; z-index: 1001; }
        .panel { background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card { padding: 15px; margin: 10px 0; border-radius: 12px; cursor: pointer; }
        .primary { background: #f0fdf4; border: 2px solid #22c55e; }
        .backup { background: #fff7ed; border: 2px solid #f97316; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="container">
    <div class="panel">
        <h3>สถานีชาร์จ EV (รวม 13 แห่ง)</h3>
        <div id="list">กำลังประมวลผล...</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([15.700, 100.120], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    // ข้อมูลสถานี 13 จุด
    var evStations = [
        { name: "ReverSharger (ส.อรุณ)", lat: 15.7099, lng: 100.1179 },
        { name: "EA Anywhere (จุดที่ 1)", lat: 15.6976, lng: 100.1195 },
        { name: "EA Anywhere (จุดที่ 2)", lat: 15.7309, lng: 100.1164 },
        { name: "EA Anywhere (จุดที่ 3)", lat: 15.7369, lng: 100.1187 },
        { name: "EA Anywhere (จุดที่ 4)", lat: 15.7489, lng: 100.1215 },
        { name: "Tesla Supercharger", lat: 15.7114, lng: 100.0561 },
        { name: "PEA VOLTA นครสวรรค์", lat: 15.7096, lng: 100.1154 },
        { name: "MG Super Charge", lat: 15.7006, lng: 100.1210 },
        { name: "สถานีเสริม 1", lat: 15.6850, lng: 100.1300 },
        { name: "สถานีเสริม 2", lat: 15.7200, lng: 100.1400 },
        { name: "สถานีเสริม 3", lat: 15.7500, lng: 100.1000 },
        { name: "สถานีเสริม 4", lat: 15.7150, lng: 100.0900 },
        { name: "สถานีเสริม 5", lat: 15.7050, lng: 100.1500 }
    ];

    navigator.geolocation.getCurrentPosition(pos => {
        let uLat = pos.coords.latitude, uLng = pos.coords.longitude;
        L.marker([uLat, uLng]).addTo(map).bindPopup("คุณอยู่ที่นี่");

        evStations.forEach(st => {
            L.marker([st.lat, st.lng]).addTo(map).bindPopup(st.name);
        });

        let sorted = evStations.map(s => ({...s, d: getDist(uLat, uLng, s.lat, s.lng)})).sort((a,b) => a.d - b.d);

        L.polyline([[uLat, uLng], [sorted[0].lat, sorted[0].lng]], {color: 'green', weight: 4}).addTo(map);
        L.polyline([[uLat, uLng], [sorted[1].lat, sorted[1].lng]], {color: 'orange', weight: 4, dashArray: '10, 10'}).addTo(map);

        document.getElementById("list").innerHTML = `
            <div class="card primary" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${sorted[0].lat},${sorted[0].lng}')">
                <strong>★ สถานีหลัก: ${sorted[0].name}</strong>
            </div>
            <div class="card backup" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${sorted[1].lat},${sorted[1].lng}')">
                <strong>🛡️ สถานีสำรอง: ${sorted[1].name}</strong>
            </div>
        `;
    });

    function getDist(lat1, lon1, lat2, lon2) {
        let R = 6371;
        let dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        let a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
