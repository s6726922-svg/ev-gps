<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณและแนะนำสถานีชาร์จ EV - นครสวรรค์</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { margin: 0; background-color: #f8fafc; }
        #map { width: 100%; height: 40vh; }
        .container { padding: 20px; max-width: 650px; margin: -30px auto 30px; position: relative; z-index: 1001; }
        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .station-item { padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #e2e8f0; background: #fff; }
        .btn-nav { display: inline-block; margin-top: 8px; padding: 6px 12px; background: #3b82f6; color: white; border-radius: 6px; text-decoration: none; font-size: 13px; }
        .btn-nav:hover { background: #2563eb; }
        .review-section { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 8px; }
        .btn-submit { background: #22c55e; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; }
        .user-gps-dot { background: #3b82f6; border-radius: 50%; border: 3px solid white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="panel">
            <h3><i class="fa-solid fa-charging-station"></i> สถานีชาร์จใกล้คุณ</h3>
            <div id="station-list"></div>
        </div>

        <div class="review-section">
            <h4><i class="fa-regular fa-comment-dots"></i> แบ่งปันข้อมูลสถานี</h4>
            <input type="text" id="rev-name" placeholder="ชื่อของคุณ">
            <textarea id="rev-text" placeholder="ความคิดเห็น..."></textarea>
            <button class="btn-submit" onclick="addReview()">ส่งความคิดเห็น</button>
            <div id="reviews-box" style="margin-top:15px; font-size: 14px;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([15.700, 100.120], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        var stations = [
            { name: "ReverSharger (ส.อรุณ)", lat: 15.7099424, lng: 100.1179482, type: "DC 120 kW" },
            { name: "MG Super Charge", lat: 15.700614, lng: 100.1210426, type: "DC 50 kW" },
            { name: "EA Anywhere (จุดที่ 1)", lat: 15.6976186, lng: 100.1195736, type: "AC 22 kW" },
            { name: "EA Anywhere (จุดที่ 2)", lat: 15.7309677, lng: 100.1164405, type: "DC 150 kW" },
            { name: "EA Anywhere (จุดที่ 3)", lat: 15.7369174, lng: 100.1187196, type: "DC 150 kW" },
            { name: "EA Anywhere (จุดที่ 4)", lat: 15.7489949, lng: 100.1215241, type: "DC 150 kW" },
            { name: "Tesla Supercharger", lat: 15.711412, lng: 100.0561, type: "DC 250 kW" },
            { name: "ReverSharger 2", lat: 15.6401394, lng: 100.1332916, type: "DC 120 kW" },
            { name: "Altervim Charging", lat: 15.7078974, lng: 100.0946941, type: "DC 90 kW" },
            { name: "Spark Charging", lat: 15.7076225, lng: 100.0876302, type: "DC 120 kW" },
            { name: "PEA VOLTA นครสวรรค์", lat: 15.7096599, lng: 100.1154054, type: "DC 120 kW" },
            { name: "PTT Station (จุดที่ 1)", lat: 15.7079146, lng: 100.1429420, type: "DC 120 kW" },
            { name: "PTT Station (จุดที่ 2)", lat: 15.6317220, lng: 100.1294172, type: "DC 120 kW" }
        ];

        let listHTML = "";
        stations.forEach(s => {
            L.marker([s.lat, s.lng]).addTo(map).bindPopup(s.name);
            listHTML += `<div class="station-item">
                            <b>${s.name}</b><br><small>${s.type}</small><br>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank" class="btn-nav">
                                <i class="fa-solid fa-location-arrow"></i> นำทางด้วย Google Maps
                            </a>
                         </div>`;
        });
        document.getElementById('station-list').innerHTML = listHTML;

        L.marker([15.89725, 100.30617], { icon: L.divIcon({ className: 'user-gps-dot', iconSize: [20, 20] }) }).addTo(map).bindPopup("คุณอยู่ที่นี่");

        function addReview() {
            let name = document.getElementById('rev-name').value;
            let text = document.getElementById('rev-text').value;
            if(name && text) {
                document.getElementById('reviews-box').innerHTML += `<p><b>${name}</b>: ${text}</p>`;
                document.getElementById('rev-name').value = '';
                document.getElementById('rev-text').value = '';
            }
        }
    </script>
</body>
</html>
