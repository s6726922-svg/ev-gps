<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณและแนะนำสถานีชาร์จ EV อัจฉริยะ - นครสวรรค์</title>

    <!-- Leaflet, Fonts & Icons -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { margin: 0; padding: 0; background-color: #f8fafc; color: #1e293b; }
        
        #map { width: 100%; height: 40vh; box-shadow: inset 0 -5px 15px rgba(0,0,0,0.05); }
        
        .container { padding: 20px; max-width: 650px; margin: -30px auto 30px; position: relative; z-index: 1001; }
        
        /* แดชบอร์ดวิเคราะห์ผลหลัก */
        .panel {
            background: rgba(255, 255, 255, 0.95); 
            padding: 24px; 
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            margin-bottom: 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            backdrop-filter: blur(10px);
        }
        
        h3 { margin-top: 0; color: #0f172a; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        h4 { margin-top: 0; color: #0f172a; font-size: 15px; font-weight: 700; }
        
        /* สไตล์สถานีชาร์จหลัก-รองแบบปุ่มการ์ดกดง่าย */
        .station-detail, .backup-station { 
            padding: 16px; 
            margin: 14px 0; 
            border-radius: 14px; 
            text-align: left; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            cursor: pointer;
        }
        .station-detail:hover, .backup-station:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.08); }
        
        .station-detail { background: #f0fdf4; border: 2px solid #22c55e; color: #166534; }
        .backup-station { background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; }
        
        .amenity-tag { background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.05); color: #475569; padding: 3px 10px; border-radius: 20px; font-size: 11px; display: inline-block; margin: 3px 3px 0 0; font-weight: 500; }
        .star-rating { color: #eab308; font-size: 14px; font-weight: 700; display: inline-block; margin-top: 6px; }
        
        /* ส่วนของระบบรีวิว */
        .review-section { 
            background: #ffffff; 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.04); 
            border: 1px solid #f1f5f9;
        }
        .review-input-group { margin-bottom: 12px; display: flex; gap: 10px; }
        
        input, select, textarea { 
            padding: 10px 14px; 
            border: 1px solid #cbd5e1; 
            border-radius: 10px; 
            font-size: 13px; 
            outline: none;
            transition: all 0.2s;
            background: #f8fafc;
        }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        textarea { width: 100%; box-sizing: border-box; resize: none; }
        
        .btn-submit { 
            background: linear-gradient(135deg, #22c55e, #16a34a); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 13px;
            width: 100%;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
            transition: all 0.2s;
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(34, 197, 94, 0.3); }
        
        .review-list { max-height: 160px; overflow-y: auto; text-align: left; margin-top: 15px; border-top: 1px solid #f1f5f9; padding-top: 12px; }
        .review-item { padding: 10px 6px; border-bottom: 1px solid #f8fafc; font-size: 12px; color: #475569; line-height: 1.5; }

        .leaflet-routing-container { display: none !important; }
        
        .user-gps-dot {
            background-color: #3b82f6; border: 2px solid white; border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .loading-pulse { font-size: 13px; color: #64748b; text-align: center; padding: 20px 0; }
        .spinner { animation: rotate 2s infinite linear; display: inline-block; margin-right: 6px; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        
        <div class="panel" id="main-panel">
            <h3><i class="fa-solid fa-satellite-dish" style="color: #3b82f6; animation: pulse 1.5s infinite;"></i> ระบบจัดสรรโครงข่ายและคำนวณทางเลือก EV</h3>
            <div id="status-text">
                <div class="loading-pulse">
                    <span class="spinner"><i class="fa-solid fa-circle-notch"></i></span> กำลังเชื่อมต่อสัญญาณ GPS และประมวลผลทางคณิตศาสตร์แบบ Real-time...
                </div>
            </div>
        </div>

        <div class="review-section">
            <h4><i class="fa-regular fa-comment-dots" style="color: #10b981;"></i> สื่อสารและแบ่งปันข้อมูล (ระบบรีวิวผู้ใช้)</h4>
            <div class="review-input-group">
                <input type="text" id="rev-name" placeholder="ชื่อของคุณ" style="flex: 2;">
                <select id="rev-stars" style="flex: 1.5;">
                    <option value="5">⭐⭐⭐⭐⭐</option>
                    <option value="4">⭐⭐⭐⭐</option>
                    <option value="3">⭐⭐⭐</option>
                    <option value="2">⭐⭐</option>
                    <option value="1">⭐</option>
                </select>
            </div>
            <textarea id="rev-text" rows="2" placeholder="พิมพ์ความคิดเห็นของคุณเกี่ยวกับสถานีชาร์จที่นี่..." style="margin-bottom: 10px;"></textarea>
            <button class="btn-submit" onclick="addReview()"><i class="fa-solid fa-paper-plane"></i> ส่งความคิดเห็น</button>

            <div class="review-list" id="reviews-box">
                <div class="review-item"><b>คุณสมชาย:</b> ตู้ Tesla ชาร์จไวมากครับ แวะกินกาแฟรอแปดนาทีเต็ม ⭐⭐⭐⭐⭐</div>
                <div class="review-item"><b>คุณวิภา:</b> ปั๊ม ReverSharger สะดวกดีค่ะ มีเซเว่นกับห้องน้ำสะอาด ⭐⭐⭐⭐</div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        var map = L.map('map').setView([15.700, 100.120], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© CartoDB' }).addTo(map);

        var evStations = [
            { name: "ReverSharger (ส.อรุณ)", lat: 15.7099424, lng: 100.1179482, slots: 4, type: "กระแสตรง (DC Fast Charge 120 kW)", amenities: ["7-Eleven", "ห้องน้ำ", "ร้านกาแฟ"], systemStars: 4.6 },
            { name: "MG Super Charge Charging Station", lat: 15.700614, lng: 100.1210426, slots: 2, type: "กระแสตรง (DC Fast Charge 50 kW)", amenities: ["ห้องน้ำ", "จุดพักรถ"], systemStars: 4.1 },
            { name: "EA Anywhere (จุดที่ 1)", lat: 15.6976186, lng: 100.1195736, slots: 3, type: "กระแสสลับ (AC Normal Charge 22 kW)", amenities: ["ห้องน้ำ", "ร้านอาหาร"], systemStars: 3.9 },
            { name: "EA Anywhere (จุดที่ 2)", lat: 15.7309677, lng: 100.1164405, slots: 4, type: "กระแสตรง (DC Fast Charge 150 kW)", amenities: ["7-Eleven", "ห้องน้ำ", "ร้านกาแฟ Amazon"], systemStars: 4.7 },
            { name: "EA Anywhere (จุดที่ 3)", lat: 15.7369174, lng: 100.1187196, slots: 2, type: "กระแสตรง (DC Fast Charge 150 kW)", amenities: ["ห้องน้ำ", "ร้านค้าปลีก"], systemStars: 4.3 },
            { name: "EA Anywhere (จุดที่ 4)", lat: 15.7489949, lng: 100.1215241, slots: 6, type: "กระแสตรง (DC Fast Charge 150 kW)", amenities: ["7-Eleven", "ห้องน้ำขนาดใหญ่", "ร้านกาแฟ"], systemStars: 4.8 },
            { name: "Tesla Supercharger นครสวรรค์", lat: 15.711412, lng: 100.0561, slots: 4, type: "กระแสตรง (DC Supercharger 250 kW)", amenities: ["ห้างสรรพสินค้า V-Square", "ห้องน้ำห้าง", "Starbucks"], systemStars: 4.9 },
            { name: "ReverSharger 2", lat: 15.6401394, lng: 100.1332916, slots: 2, type: "กระแสตรง (DC Fast Charge 120 kW)", amenities: ["ปั๊มน้ำมัน", "ห้องน้ำ", "ร้านสะดวกซื้อ"], systemStars: 4.4 },
            { name: "Altervim Charging Station", lat: 15.7078974, lng: 100.0946941, slots: 2, type: "กระแสตรง (DC Fast Charge 90 kW)", amenities: ["ห้องน้ำ", "ร้านกาแฟ"], systemStars: 4.2 },
            { name: "Spark Charging Station", lat: 15.7076225, lng: 100.0876302, slots: 2, type: "กระแสตรง (DC Fast Charge 120 kW)", amenities: ["7-Eleven", "ห้องน้ำ", "ร้านกาแฟอินทนิล"], systemStars: 4.5 },
            { name: "PEA VOLTA นครสวรรค์", lat: 15.7096599, lng: 100.1154054, slots: 4, type: "กระแสตรง (DC Fast Charge 120 kW)", amenities: ["สำนักงาน PEA", "ห้องน้ำ"], systemStars: 4.3 },
            { name: "PTT Station Charging (จุดที่ 1)", lat: 15.7079146, lng: 100.1429420, slots: 3, type: "กระแสตรง (DC Fast Charge 120 kW)", amenities: ["ปั๊ม PTT ใหญ่", "7-Eleven", "Café Amazon"], systemStars: 4.6 },
            { name: "PTT Station Charging (จุดที่ 2)", lat: 15.6317220, lng: 100.1294172, slots: 3, type: "กระแสตรง (DC Fast Charge 120 kW)", amenities: ["ปั๊ม PTT ยุทธศาสตร์", "7-Eleven", "Café Amazon"], systemStars: 4.5 }
        ];

        var routingControl = null;
        var userMarker = null;
        var userLocation = null; // เก็บพิกัดของผู้ใช้ไว้ลากเส้นซ้ำ

        // ปักหมุดสถานีทั้งหมดลงบนแผนที่
        evStations.forEach(function(st, index) {
            var amHtml = st.amenities.map(a => `<span class='amenity-tag'>📌 ${a}</span>`).join(' ');
            var marker = L.marker([st.lat, st.lng]).addTo(map)
             .bindPopup(`<b style="color:#0f172a;">🔌 สถานี: ${st.name}</b><br><span style="font-size:12px;color:#475569;">จำนวน: ${st.slots} หัวชาร์จ<br>ระบบ: ${st.type}<br>คะแนน: ⭐ ${st.systemStars}<br>${amHtml}</span>`);
            
            // 🔥 ฟังก์ชันเด็ด: เมื่อกดคลิกที่หมุดใดๆ บนแผนที่ ให้ลากเส้นทางใหม่ทันที
            marker.on('click', function() {
                if (userLocation) {
                    drawRoute(userLocation.lat, userLocation.lng, st.lat, st.lng);
                    highlightStationCard(index); // ไฮไลท์กรอบความเข้มที่การ์ดข้อมูลด้านล่าง (ถ้ามี)
                }
            });
        });

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(processEVLogic, function() {
                    document.getElementById("status-text").innerHTML = "<div style='color:#ef4444;text-align:center;font-size:13px;padding:10px;'><i class='fa-solid fa-triangle-exclamation'></i> โปรดอนุญาตสิทธิ์เข้าถึง GPS เพื่อคำนวณโครงข่ายคณิตศาสตร์</div>";
                }, { enableHighAccuracy: true });
            }
        };

        // ฟังก์ชันสำหรับสั่งลากเส้นทางนำทางสีฟ้า
        function drawRoute(startLat, startLng, endLat, endLng) {
            if (routingControl) { map.removeControl(routingControl); }
            routingControl = L.Routing.control({
                waypoints: [L.latLng(startLat, startLng), L.latLng(endLat, endLng)],
                routeWhileDragging: false, 
                addWaypoints: false,
                lineStyle: { styles: [{ color: '#3b82f6', opacity: 0.8, weight: 6 }] }
            }).addTo(map);
        }

        function processEVLogic(position) {
            var userLat = position.coords.latitude;
            var userLng = position.coords.longitude;
            userLocation = { lat: userLat, lng: userLng }; // บันทึกพิกัดผู้ใช้เก็บไว้

            var gpsIcon = L.divIcon({ className: 'user-gps-dot', iconSize: [16, 18], iconAnchor: [8, 9] });
            if (userMarker) { map.removeLayer(userMarker); }
            userMarker = L.marker([userLat, userLng], { icon: gpsIcon }).addTo(map).bindPopup("<b>📍 ตำแหน่งปัจจุบันของคุณ</b>").openPopup();

            // ค้นหาดุลยภาพความต่างพิกัด
            var calculatedList = evStations.map(function(station, index) {
                var dist = calculateHaversine(userLat, userLng, station.lat, station.lng);
                return { data: station, distance: dist, originalIndex: index };
            });
            
            calculatedList.sort((a, b) => a.distance - b.distance);

            var primary = calculatedList[0];
            var secondary = calculatedList[1];

            // ครั้งแรกที่เปิดหน้าเว็บบรรเลงลากเส้นไปหาจุดใกล้สุดทันที
            drawRoute(userLat, userLng, primary.data.lat, primary.data.lng);

            var primaryAmenities = primary.data.amenities.map(a => `<span class='amenity-tag'>${a}</span>`).join(' ');
            var secondaryAmenities = secondary.data.amenities.map(a => `<span class='amenity-tag'>${a}</span>`).join(' ');

            var resultHtml = `
                <div style="font-size: 13px; line-height: 1.6; color:#334155;">
                    <p style="color:#16a34a; font-weight:700; margin: 0 0 12px 0; font-size:14px;"><i class="fa-solid fa-circle-check"></i> ประมวลผลดุลยภาพพิกัดสำเร็จ (คลิกที่กล่องการ์ดหรือหมุดเพื่อเปลี่ยนเส้นทาง):</p>
                    
                    <div class="station-detail" id="card-${primary.originalIndex}" onclick="changeRouteViaCard(${primary.data.lat}, ${primary.data.lng}, ${primary.originalIndex})">
                        <strong style="font-size:14px; display:block; margin-bottom:4px;"><i class="fa-solid fa-star" style="color:#22c55e;"></i> สถานีหลักที่ใกล้ที่สุด (Primary):</strong>
                        <span style="font-size:15px; font-weight:700; color:#0f172a; display:block; margin-bottom:4px;">${primary.data.name}</span>
                        📍 ระยะทางกระจัด: <b>${primary.distance.toFixed(2)} กม.</b><br>
                        🔌 ทรัพยากร: <b>${primary.data.slots} ช่องชาร์จ</b> | ${primary.data.type}<br>
                        <div style="margin-top:6px;">${primaryAmenities}</div>
                        <span class="star-rating"><i class="fa-solid fa-calculator"></i> คะแนนระบบ: ${primary.data.systemStars} / 5.0</span>
                    </div>

                    <div class="backup-station" id="card-${secondary.originalIndex}" onclick="changeRouteViaCard(${secondary.data.lat}, ${secondary.data.lng}, ${secondary.originalIndex})">
                        <strong style="font-size:14px; display:block; margin-bottom:4px;"><i class="fa-solid fa-shield-halved" style="color:#ea580c;"></i> สถานีสำรองแนะนำ (Alternative):</strong>
                        <span style="font-size:15px; font-weight:700; color:#0f172a; display:block; margin-bottom:4px;">${secondary.data.name}</span>
                        📍 ระยะทางถัดไป: <b>${secondary.distance.toFixed(2)} กม.</b> (กรณีสถานีหลักไม่ว่าง)<br>
                        🔌 ทรัพยากร: <b>${secondary.data.slots} ช่องชาร์จ</b> | ${secondary.data.type}<br>
                        <div style="margin-top:6px;">${secondaryAmenities}</div>
                        <span class="star-rating" style="color:#eab308;"><i class="fa-solid fa-calculator"></i> คะแนนระบบ: ${secondary.data.systemStars} / 5.0</span>
                    </div>
                </div>
            `;
            
            document.getElementById("status-text").innerHTML = resultHtml;
            highlightStationCard(primary.originalIndex);
        }

        // กดลากเส้นใหม่ผ่านการคลิกกล่องข้อมูลการ์ดด้านล่าง
        function changeRouteViaCard(destLat, destLng, index) {
            if (userLocation) {
                drawRoute(userLocation.lat, userLocation.lng, destLat, destLng);
                highlightStationCard(index);
                // เลื่อนแผนที่ไปโฟกัสจุดนั้น
                map.panTo(new L.LatLng(destLat, destLng));
            }
        }

        // จัดการเปลี่ยนเส้นหนา-บางของกล่องสถานีให้สอดคล้องกับเส้นทางปัจจุบัน
        function highlightStationCard(activeIndex) {
            document.querySelectorAll('.station-detail, .backup-station').forEach(el => {
                el.style.borderWidth = "1px";
                el.style.boxShadow = "0 4px 6px -1px rgba(0, 0, 0, 0.05)";
            });
            var activeCard = document.getElementById(`card-${activeIndex}`);
            if (activeCard) {
                activeCard.style.borderWidth = "3px";
                activeCard.style.boxShadow = "0 10px 15px -3px rgba(59, 130, 246, 0.2)";
            }
        }

        function calculateHaversine(lat1, lon1, lat2, lon2) {
            var R = 6371; 
            var dLat = (lat2 - lat1) * Math.PI / 180; var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function addReview() {
            var name = document.getElementById("rev-name").value || "ผู้ใช้ทั่วไป";
            var starsValue = document.getElementById("rev-stars").value;
            var text = document.getElementById("rev-text").value;
            
            if(!text) { alert("โปรดกรอกข้อความแสดงความคิดเห็นก่อนครับ"); return; }
            
            var starString = "⭐".repeat(starsValue);
            var box = document.getElementById("reviews-box");
            
            var newItem = document.createElement("div");
            newItem.className = "review-item";
            newItem.innerHTML = `<b>${name}:</b> ${text} <span style='color:#eab308; float:right;'>${starString}</span>`;
            
            box.insertBefore(newItem, box.firstChild);
            
            document.getElementById("rev-name").value = "";
            document.getElementById("rev-text").value = "";
        }
    </script>
</body>
