<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณและลากเส้นทางไปยังสถานีชาร์จ EV ที่ใกล้ที่สุด</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100%; height: 78vh; }
        
        /* กล่องรายงานผลคณิตศาสตร์ */
        #status-panel {
            height: 22vh; background: #ffffff; padding: 15px; box-sizing: border-box;
            border-top: 4px solid #28a745; text-align: center; box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        #status-text { font-size: 14px; color: #333; line-height: 1.6; }
        .success-text { color: #28a745; font-weight: bold; font-size: 15px; }
        .math-text { color: #007bff; font-weight: bold; }

        /* ซ่อนกล่องบอกทางตัวหนังสือข้างๆ แผนที่ เพื่อไม่ให้บังหน้าจอ */
        .leaflet-routing-container { display: none !important; }

        /* เอฟเฟกต์หมุด GPS ผู้ใช้กระพริบ */
        .user-gps-dot {
            background-color: #007bff; border: 2px solid white; border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7); animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 123, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 123, 255, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 123, 255, 0); }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="status-panel">
        <div id="status-text">🔄 กำลังเปิดระบบ GPS และจำลองเส้นทางโครงข่ายคณิตศาสตร์อัตโนมัติ...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        // 1. ตั้งค่าแผนที่ฐานเริ่มต้นที่นครสวรรค์
        var map = L.map('map').setView([15.700, 100.120], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // พิกัดสถานีชาร์จรถไฟฟ้า EV ทั้ง 7 แห่งในนครสวรรค์
        var evStations = [
            { name: "ReverSharger", lat: 15.7099424, lng: 100.1179482 },
            { name: "MG Super Charge", lat: 15.700614, lng: 100.1210426 },
            { name: "EA Anywhere 1", lat: 15.6976186, lng: 100.1195736 },
            { name: "EA Anywhere 2", lat: 15.7309677, lng: 100.1164405 },
            { name: "EA Anywhere 3", lat: 15.7369174, lng: 100.1187196 },
            { name: "EA Anywhere 4", lat: 15.7489949, lng: 100.1215241 },
            { name: "Tesla Supercharger", lat: 15.711412, lng: 100.0561 }
        ];

        // ปักหมุดสถานีชาร์จทั้งหมดเตรียมไว้บนแผนที่
        evStations.forEach(function(station) {
            L.marker([station.lat, station.lng]).addTo(map)
             .bindPopup("<b>🔌 สถานีชาร์จ EV: " + station.name + "</b>");
        });

        var routingControl = null;
        var userMarker = null;

        // 2. เรียกใช้ระบบสแกน GPS พิกัดปัจจุบันทันทีที่เปิดหน้าเว็บ
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(initRouting, handleGPSError, {
                    enableHighAccuracy: true
                });
            } else {
                document.getElementById("status-text").innerHTML = "❌ อุปกรณ์นี้ไม่รองรับระบบ GPS";
            }
        };

        // 3. เมื่อระบบดึงพิกัดสำเร็จ จะเริ่มวาดเส้นทางคณิตศาสตร์ทันที
        function initRouting(position) {
            var userLat = position.coords.latitude;
            var userLng = position.coords.longitude;

            // ปักหมุดสีฟ้าแสดงจุดที่ผู้ใช้อยู่ปัจจุบัน
            var gpsIcon = L.divIcon({ className: 'user-gps-dot', iconSize: [18, 18], iconAnchor: [9, 9] });
            if (userMarker) { map.removeLayer(userMarker); }
            userMarker = L.marker([userLat, userLng], { icon: gpsIcon }).addTo(map)
                          .bindPopup("<b>📍 พิกัดปัจจุบันของคุณ</b>").openPopup();

            // 🧮 คำนวณหาสถานีชาร์จที่ใกล้ที่สุดด้วยสูตรทางคณิตศาสตร์
            var closestStation = null;
            var minDistance = Infinity;

            evStations.forEach(function(station) {
                var distance = calculateHaversine(userLat, userLng, station.lat, station.lng);
                if (distance < minDistance) {
                    minDistance = distance;
                    closestStation = station;
                }
            });

            // 🛣️ สั่งให้ระบบลากเส้นจากจุดผู้ใช้ไปยังสถานีชาร์จที่ใกล้ที่สุดบนโครงข่ายถนนจริง
            if (routingControl) { map.removeControl(routingControl); }
            
            routingControl = L.Routing.control({
                waypoints: [
                    L.latLng(userLat, userLng), // จุดเริ่มต้น (ผู้ใช้)
                    L.latLng(closestStation.lat, closestStation.lng) // จุดปลายทาง (ตู้ชาร์จที่ใกล้ที่สุด)
                ],
                routeWhileDragging: false,
                addWaypoints: false, // บล็อกไม่ให้ผู้ใช้กดเลื่อนจุดเองเพื่อความเสถียร
                lineStyle: {
                    styles: [{ color: '#007bff', opacity: 0.8, weight: 6 }] // ปรับสไตล์เส้นทางสีน้ำเงินหนาๆ ชัดๆ
                }
            }).addTo(map);

            // อัปเดตข้อความรายงานผลเชิงวิชาการให้กรรมการดู
            document.getElementById("status-text").innerHTML = 
                "<span class='success-text'>🛰️ เชื่อมต่อโครงข่ายคณิตศาสตร์สำเร็จ!</span><br>" +
                "📍 พิกัดปัจจุบันของคุณ: " + userLat.toFixed(5) + ", " + userLng.toFixed(5) + "<br>" +
                "🧮 <span class='math-text'>การวิเคราะห์ทฤษฎีกราฟ:</span> จุดยอด (Vertex) ตู้ชาร์จรถไฟฟ้าที่ใกล้ที่สุดคือ <b>" + closestStation.name + "</b><br>" +
                "📏 ระยะทางกระจัดเส้นตรงบนผิวโลกประมาณ: <b>" + minDistance.toFixed(2) + " กม.</b>";
        }

        // สูตรคณิตศาสตร์ทางภูมิศาสตร์ (Haversine Formula) สำหรับหาจุดที่สั้นที่สุด
        function calculateHaversine(lat1, lon1, lat2, lon2) {
            var R = 6371; 
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function handleGPSError(error) {
            document.getElementById("status-text").innerHTML = "❌ ไม่สามารถดึงตำแหน่ง GPS ได้ โปรดตรวจสอบว่าคุณได้กด 'อนุญาต' ให้สิทธิ์เข้าถึงพิกัดตำแหน่งแล้วหรือยังครับ";
        }
    </script>
</body>
</html>
